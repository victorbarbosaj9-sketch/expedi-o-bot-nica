<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Expedição Botânica</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap');

:root {
  --bg: #1c1c1c;
  --cl: #748b48;
  --cd: #4b5c2d;
  --cb: #2a6010;
  --track: #3d8620;
  --shine: rgba(255,255,255,.2);
  --cell-size: 52px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  background: var(--bg);
  font-family: 'Fredoka One', cursive;
  overflow-x: hidden;
  min-height: 100vh;
}

/* ── STICKY PANEL ── */
.panel {
  position: sticky;
  top: 0;
  z-index: 100;
  width: 100%;
  max-width: 500px;
  margin: 0 auto;
  background: #101c08;
  border-bottom: 2px solid #4a9a2a;
  padding: 8px 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  box-shadow: 0 3px 12px rgba(0,0,0,.6);
}
.turn-info { flex: 1; }
.turn-label {
  font-size: clamp(13px,4vw,17px);
  color: #c8f060;
  display: flex;
  align-items: center;
  gap: 6px;
}
.turn-dot {
  width: 18px; height: 18px;
  border-radius: 50%;
  border: 2px solid rgba(255,255,255,.4);
  box-shadow: 0 1px 5px rgba(0,0,0,.6);
  flex-shrink: 0;
}
.pl-list {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
  margin-top: 4px;
}
.pl-chip {
  display: flex;
  align-items: center;
  gap: 3px;
  background: rgba(255,255,255,.07);
  border-radius: 10px;
  padding: 2px 7px;
  font-size: clamp(10px,2.5vw,12px);
  color: #aaa;
}
.pl-dot {
  width: 9px; height: 9px;
  border-radius: 50%;
  border: 1.5px solid rgba(255,255,255,.35);
}
.btn-carta {
  background: linear-gradient(150deg,#f5c542,#c8880a);
  color: #fff;
  border: 2px solid #7a5000;
  border-radius: 20px;
  padding: 8px 14px;
  font-family: 'Fredoka One', cursive;
  font-size: clamp(13px,3.5vw,15px);
  cursor: pointer;
  box-shadow: 0 3px 0 #5a3800;
  white-space: nowrap;
  transition: transform .1s, box-shadow .1s;
}
.btn-carta:active { transform: translateY(2px); box-shadow: 0 1px 0 #5a3800; }

/* ── WIN CONDITION BAR ── */
.win-bar {
  width: 100%;
  max-width: 500px;
  margin: 0 auto;
  background: #0a1505;
  border-bottom: 1px solid #2a5010;
  padding: 5px 12px;
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  color: #8aca40;
}
.win-bar select {
  background: #1a2e0c;
  color: #c8f060;
  border: 1px solid #4a8a20;
  border-radius: 6px;
  padding: 2px 6px;
  font-family: 'Fredoka One', cursive;
  font-size: 12px;
}
.finishers-list {
  display: flex; gap: 4px; flex-wrap: wrap; margin-left: 4px;
}
.finisher-badge {
  background: #3a7010;
  border-radius: 8px;
  padding: 1px 6px;
  color: #c8f060;
  font-size: 11px;
  display: flex; align-items: center; gap: 3px;
}

/* ── DEBUG PANEL ── */
.debug-panel {
  width: 100%;
  max-width: 500px;
  margin: 0 auto;
  background: #0e1a08;
  border-bottom: 1px solid #2a5010;
  padding: 6px 12px;
  display: flex;
  gap: 6px;
  align-items: center;
  flex-wrap: wrap;
}
.debug-panel label { color: #8aca40; font-size: 12px; }
.debug-panel select, .debug-panel input {
  background: #1a2e0c;
  color: #c8f060;
  border: 1px solid #4a8a20;
  border-radius: 6px;
  padding: 3px 6px;
  font-family: 'Fredoka One', cursive;
  font-size: 12px;
}
.debug-panel button {
  background: #3a8020;
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 4px 10px;
  font-family: 'Fredoka One', cursive;
  font-size: 12px;
  cursor: pointer;
}

/* ── TITLE ── */
.title-wrap {
  width: 100%;
  max-width: 500px;
  margin: 14px auto 0;
  margin-bottom: 10px;
  display: flex;
  justify-content: center;
}
.title {
  padding: 7px 22px 9px;
  background: #dff0a0;
  border: 3px solid #3a7010;
  border-radius: 8px;
  outline: 2px dashed #3a7010;
  outline-offset: 3px;
  box-shadow: 0 3px 0 #2a5a08, inset 0 1px 0 rgba(255,255,255,.6);
  color: #2a5a08;
  font-size: clamp(15px,5vw,21px);
  letter-spacing: 2px;
  text-transform: uppercase;
  text-shadow: 1px 1px 0 rgba(255,255,255,.5);
}

/* ── BOARD ── */
.board-outer {
  width: 100%;
  max-width: 500px;
  margin: 0 auto;
  position: relative;
  padding-bottom: 15px;
}

#track-svg {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 0;
  overflow: visible;
}

#cells-layer {
  position: relative;
  width: 100%;
}

.cell {
  position: absolute;
  width: var(--cell-size);
  height: var(--cell-size);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: clamp(16px,4.5vw,22px);
  border: 3px solid var(--cb);
  box-shadow: 0 3px 0 rgba(0,0,0,.5), inset 0 2px 0 var(--shine);
  cursor: default;
  transition: transform .15s;
  z-index: 2;
  transform: translate(-50%, -50%);
  line-height: 1;
}
.cell.L { background: var(--cl); }
.cell.D { background: var(--cd); }
.cell.start { background: #b4e860; border-color: #5ca018; }
.cell.fim   { background: #8acd30; border-color: #3a7008; }
.cell.finished-cell { background: #f5c542 !important; border-color: #c8880a !important; box-shadow: 0 3px 0 rgba(0,0,0,.5), 0 0 0 4px rgba(245,197,66,.4), inset 0 2px 0 var(--shine); }
.cell:hover { transform: translate(-50%,-50%) scale(1.12); z-index: 5; }

.cell .num {
  position: absolute;
  bottom: -1px; right: -1px;
  background: rgba(0,0,0,.45);
  color: #fff;
  font-size: 8px;
  border-radius: 50%;
  width: 14px; height: 14px;
  display: flex; align-items: center; justify-content: center;
  pointer-events: none;
}

.cell .pawns {
  position: absolute;
  inset: 0;
  border-radius: 50%;
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  justify-content: center;
  gap: 1px;
  pointer-events: none;
  z-index: 3;
}
.pawn {
  width: 30%;
  aspect-ratio: 1;
  border-radius: 50%;
  border: 1.5px solid rgba(0,0,0,.5);
  box-shadow: 0 1px 5px rgba(0,0,0,.7);
}

.map-lbl {
  position: absolute;
  font-style: italic;
  color: #a0e020;
  font-size: clamp(15px,5vw,20px);
  text-shadow: 1px 1px 4px rgba(0,0,0,.9);
  pointer-events: none;
  z-index: 10;
}

.deco {
  position: absolute;
  pointer-events: none;
  user-select: none;
  line-height: 1;
  z-index: 1;
}

@keyframes hop {
  0%,100% { box-shadow: 0 3px 0 rgba(0,0,0,.5), inset 0 2px 0 var(--shine); }
  50%      { box-shadow: 0 3px 0 rgba(0,0,0,.5), 0 0 0 6px rgba(255,230,0,.35), inset 0 2px 0 var(--shine); }
}
.cell.active { animation: hop .5s ease; }

@keyframes pawn-bounce {
  0%,100% { transform: scale(1); }
  50%      { transform: scale(1.25) translateY(-2px); }
}
.pawn.moving { animation: pawn-bounce .25s 3 ease-in-out; }

.fim-label {
  text-align: center;
  color: #a0e020;
  font-size: clamp(16px,5vw,22px);
  font-style: italic;
  text-shadow: 1px 1px 4px rgba(0,0,0,.9);
  padding: 10px 0 20px;
}

/* ── TELA DE VITÓRIA (MODAL) ── */
.victory-modal {
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0, 0, 0, 0.85);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 999;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.5s ease;
}
.victory-modal.active {
  opacity: 1;
  pointer-events: auto;
}
.victory-content {
  background: linear-gradient(135deg, #4b9e2a, #2a6010);
  padding: 40px 30px;
  border-radius: 20px;
  border: 4px solid #c8f060;
  text-align: center;
  box-shadow: 0 15px 40px rgba(0,0,0,0.8), inset 0 0 20px rgba(255,255,255,0.2);
  transform: scale(0.8);
  transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  color: white;
  max-width: 90%;
  width: 400px;
}
.victory-modal.active .victory-content {
  transform: scale(1);
}
.victory-content h1 {
  font-size: clamp(24px, 6vw, 32px);
  color: #f5c542;
  text-shadow: 2px 2px 0 #5a3800;
  margin-bottom: 10px;
}
.victory-content h2 {
  font-size: clamp(28px, 8vw, 40px);
  margin: 15px 0;
  text-transform: uppercase;
  text-shadow: 2px 2px 5px rgba(0,0,0,0.8);
}
.victory-content p {
  font-size: 18px;
  margin-bottom: 20px;
  color: #e8f5e9;
}
.podium-list {
  margin: 10px 0 20px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.podium-item {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  font-size: 16px;
  background: rgba(0,0,0,.25);
  border-radius: 10px;
  padding: 6px 10px;
}
.podium-dot {
  width: 14px; height: 14px;
  border-radius: 50%;
  border: 2px solid rgba(255,255,255,.5);
}
.btn-home {
  background: #f5c542;
  color: #5a3800;
  border: 3px solid #fff;
  border-radius: 30px;
  padding: 12px 25px;
  font-size: 18px;
  font-family: 'Fredoka One', cursive;
  cursor: pointer;
  box-shadow: 0 5px 0 #c8880a;
  transition: all 0.2s;
  width: 100%;
}
.btn-home:active {
  transform: translateY(5px);
  box-shadow: 0 0 0 #c8880a;
}

/* ── ICON CARD MODAL ── */
.icon-modal {
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,.82);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 998;
  opacity: 0;
  pointer-events: none;
  transition: opacity .35s;
}
.icon-modal.active {
  opacity: 1;
  pointer-events: auto;
}
.icon-card {
  background: linear-gradient(140deg, #1e3a0e, #2c5c18);
  border: 3px solid #7ed957;
  border-radius: 18px;
  padding: 28px 24px 22px;
  max-width: 340px;
  width: 90%;
  text-align: center;
  box-shadow: 0 12px 40px rgba(0,0,0,.8);
  transform: scale(.85);
  transition: transform .35s cubic-bezier(.175,.885,.32,1.275);
}
.icon-modal.active .icon-card { transform: scale(1); }
.icon-card .ic-emoji { font-size: 54px; display: block; margin-bottom: 10px; }
.icon-card .ic-name {
  color: #c8f060;
  font-size: 20px;
  margin-bottom: 10px;
  text-transform: uppercase;
  letter-spacing: 1px;
}
.icon-card .ic-info {
  color: #dff0a0;
  font-size: 15px;
  line-height: 1.5;
  margin-bottom: 14px;
  font-family: 'Segoe UI', sans-serif;
}
.icon-card .ic-effect {
  background: rgba(0,0,0,.35);
  border-radius: 12px;
  padding: 10px 14px;
  color: #f5c542;
  font-size: 16px;
  margin-bottom: 18px;
}
.btn-ic-ok {
  background: linear-gradient(150deg,#f5c542,#c8880a);
  color: #fff;
  border: 2px solid #7a5000;
  border-radius: 20px;
  padding: 10px 28px;
  font-family: 'Fredoka One', cursive;
  font-size: 16px;
  cursor: pointer;
  box-shadow: 0 3px 0 #5a3800;
  width: 100%;
}
.btn-ic-ok:active { transform: translateY(2px); }
</style>
</head>

/* ══════════════════════════════════════════════════════

══════════════════════════════════════════════════════ */

const P_COLORS = ['#2c80e8','#e83030','#f5c430','#fff','#c060f0'];

// Controla qual variante de cada ícone será usada (por ícone, cycling)
const iconVariantIdx = {};

/* ══════════════════════════════════════════════════════
   GERAÇÃO DO MAPA
══════════════════════════════════════════════════════ */
function buildSnakePoints(W, cellR) {
  const COLS = 6;
  const ROWS = Math.ceil(TOTAL / COLS);
  const padH = cellR * 1.4;
  const padV = cellR * 1.5;
  const stepX = (W - padH * 2) / (COLS - 1);
  const stepY = cellR * 3.0;
  const pts = [];
  for (let r = 0; r < ROWS; r++) {
    const rev = (r % 2 === 1);
    for (let c = 0; c < COLS; c++) {
      const idx = r * COLS + (rev ? (COLS - 1 - c) : c);
      if (idx >= TOTAL) continue;
      const x = padH + c * stepX;
      const y = padV + r * stepY;
      pts[idx] = { x, y };
    }
  }
  const totalH = padV + (ROWS - 1) * stepY + cellR * 2;
  return { pts, totalH };
}

function catmullRomPath(points) {
  if (points.length < 2) return '';
  let d = `M ${points[0].x} ${points[0].y}`;
  for (let i = 0; i < points.length - 1; i++) {
    const p0 = points[Math.max(i - 1, 0)];
    const p1 = points[i];
    const p2 = points[i + 1];
    const p3 = points[Math.min(i + 2, points.length - 1)];
    const cp1x = p1.x + (p2.x - p0.x) / 6;
    const cp1y = p1.y + (p2.y - p0.y) / 6;
    const cp2x = p2.x - (p3.x - p1.x) / 6;
    const cp2y = p2.y - (p3.y - p1.y) / 6;
    d += ` C ${cp1x} ${cp1y}, ${cp2x} ${cp2y}, ${p2.x} ${p2.y}`;
  }
  return d;
}

const cellEls = {};
let boardPoints = [];

function buildBoard() {
  const outer = document.getElementById('board-outer');
  const svg   = document.getElementById('track-svg');
  const layer = document.getElementById('cells-layer');
  svg.innerHTML = '';
  layer.innerHTML = '';

  const W = outer.clientWidth || 380;
  const cellR = Math.min(26, W * 0.068);
  const cellSize = cellR * 2;
  document.documentElement.style.setProperty('--cell-size', cellSize + 'px');

  const { pts, totalH } = buildSnakePoints(W, cellR);
  boardPoints = pts;
  layer.style.height = totalH + 'px';
  outer.style.minHeight = totalH + 'px';

  const pathD = catmullRomPath(pts);

  [
    ['rgba(0,0,0,.4)', cellSize*1.35+4, 'round'],
    ['#2a6010', cellSize*1.3+2, 'round'],
    ['#3d8620', cellSize*1.2, 'round'],
  ].forEach(([stroke, width]) => {
    const p = document.createElementNS('http://www.w3.org/2000/svg','path');
    p.setAttribute('d', pathD);
    p.setAttribute('fill','none');
    p.setAttribute('stroke', stroke);
    p.setAttribute('stroke-width', width);
    p.setAttribute('stroke-linecap','round');
    p.setAttribute('stroke-linejoin','round');
    svg.appendChild(p);
  });
  const shine = document.createElementNS('http://www.w3.org/2000/svg','path');
  shine.setAttribute('d', pathD);
  shine.setAttribute('fill','none');
  shine.setAttribute('stroke','rgba(255,255,255,.12)');
  shine.setAttribute('stroke-width', cellSize*0.4);
  shine.setAttribute('stroke-linecap','round');
  shine.setAttribute('stroke-dasharray', `${cellSize*0.6} ${cellSize*0.9}`);
  svg.appendChild(shine);

  pts.forEach((pt, idx) => {
    const div = document.createElement('div');
    div.className = 'cell ' + (idx % 2 === 0 ? 'L' : 'D');
    div.id = 'c' + idx;
    div.dataset.i = idx;
    div.style.left = pt.x + 'px';
    div.style.top  = pt.y + 'px';
    div.style.width  = cellSize + 'px';
    div.style.height = cellSize + 'px';
    div.style.fontSize = Math.max(12, cellSize * 0.5) + 'px';
    if (idx === 0)         div.classList.add('start');
    if (idx === TOTAL - 1) div.classList.add('fim');

    const ic = document.createElement('span');
    ic.textContent = ICONS[idx] || '🌿';
    div.appendChild(ic);

    const nb = document.createElement('div');
    nb.className = 'num';
    nb.textContent = idx + 1;
    div.appendChild(nb);

    const pw = document.createElement('div');
    pw.className = 'pawns';
    div.appendChild(pw);

    layer.appendChild(div);
    cellEls[idx] = div;
  });

  addMapLabel(outer, pts[0].x + cellR + 4, pts[0].y - cellR - 6, 'Início ↗');

  const decos = [
    { pct_x: 0.02, pct_y: 0.04,  e: '🌋', f: 38 },
    { pct_x: 0.01, pct_y: 0.12,  e: '🌲', f: 22 },
    { pct_x: 0.01, pct_y: 0.25,  e: '🌿', f: 18 },
    { pct_x: 0.01, pct_y: 0.40,  e: '🌳', f: 22 },
    { pct_x: 0.02, pct_y: 0.55,  e: '🍃', f: 18 },
    { pct_x: 0.01, pct_y: 0.70,  e: '🌱', f: 20 },
    { pct_x: 0.01, pct_y: 0.85,  e: '🌿', f: 18 },
    { pct_x: 0.01, pct_y: 0.95,  e: '🏔️', f: 26 },
    { pct_x: 0.90, pct_y: 0.07,  e: '🌲', f: 22 },
    { pct_x: 0.92, pct_y: 0.20,  e: '🌿', f: 18 },
    { pct_x: 0.89, pct_y: 0.35,  e: '🌳', f: 22 },
    { pct_x: 0.91, pct_y: 0.50,  e: '🍃', f: 18 },
    { pct_x: 0.90, pct_y: 0.65,  e: '🌲', f: 22 },
    { pct_x: 0.92, pct_y: 0.80,  e: '🌿', f: 18 },
    { pct_x: 0.90, pct_y: 0.95,  e: '🌳', f: 22 },
    { pct_x: 0.35, pct_y: 0.28,  e: '🌲', f: 20 },
    { pct_x: 0.45, pct_y: 0.32,  e: '🌲', f: 16 },
    { pct_x: 0.30, pct_y: 0.50,  e: '🍇', f: 18 },
    { pct_x: 0.55, pct_y: 0.60,  e: '🌸', f: 18 },
    { pct_x: 0.40, pct_y: 0.72,  e: '🌼', f: 16 },
    { pct_x: 0.60, pct_y: 0.80,  e: '🍇', f: 18 },
    { pct_x: 0.25, pct_y: 0.88,  e: '🌸', f: 16 },
  ];
  decos.forEach(d => {
    const el = document.createElement('div');
    el.className = 'deco';
    el.style.left     = (d.pct_x * W) + 'px';
    el.style.top      = (d.pct_y * totalH) + 'px';
    el.style.fontSize = d.f + 'px';
    el.textContent    = d.e;
    layer.appendChild(el);
  });
}

function addMapLabel(parent, x, y, text) {
  const lbl = document.createElement('div');
  lbl.className = 'map-lbl';
  lbl.style.left = x + 'px';
  lbl.style.top  = y + 'px';
  lbl.textContent = text;
  parent.querySelector('#cells-layer').appendChild(lbl);
}

/* ══════════════════════════════════════════════════════
   ESTADO DO JOGO
══════════════════════════════════════════════════════ */
let players   = [];
let positions = [];
let turn      = 0;
let finishers = []; // array de índices de jogadores que chegaram
let winCount  = 1;  // quantos precisam chegar para acabar
let skips     = []; // array de quantas rodadas cada jogador pula

function load() {
  try {
    const raw = localStorage.getItem('expedicao_jogadores');
    if (raw) {
      const p = JSON.parse(raw);
      if (typeof p === 'number') {
        const n = Math.min(Math.max(p, 2), 5);
        players = Array.from({ length: n }, (_, i) => ({ nome: P_NAMES[i], cor: P_COLORS[i] }));
      } else if (Array.isArray(p)) {
        players = p.map((x, i) => ({ nome: x.nome || P_NAMES[i], cor: x.cor || P_COLORS[i] }));
      }
    }
  } catch (_) {}
  if (!players.length) players = [
    { nome: 'Azul',     cor: P_COLORS[0] },
    { nome: 'Vermelho', cor: P_COLORS[1] },
  ];

  try {
    const raw = localStorage.getItem('posicoes_jogadores');
    if (raw) positions = JSON.parse(raw);
  } catch (_) {}
  while (positions.length < players.length) positions.push(0);
  positions = positions.slice(0, players.length);

  try { turn = parseInt(localStorage.getItem('turno_atual') || '0') || 0; } catch (_) {}
  turn = ((turn % players.length) + players.length) % players.length;

  try {
    const raw = localStorage.getItem('expedicao_finishers');
    if (raw) finishers = JSON.parse(raw);
  } catch (_) {}

  try {
    const raw = localStorage.getItem('expedicao_skips');
    if (raw) skips = JSON.parse(raw);
  } catch (_) {}
  while (skips.length < players.length) skips.push(0);

  // Win condition
  try {
    const wc = parseInt(localStorage.getItem('expedicao_wincount') || '1');
    winCount = Math.min(Math.max(wc, 1), players.length);
  } catch (_) {}

  // Update win-count selector max
  updateWinCountSelect();

  const sel = document.getElementById('dbg-nplayers');
  if (sel) sel.value = String(players.length);
}

function save() {
  localStorage.setItem('posicoes_jogadores', JSON.stringify(positions));
  localStorage.setItem('turno_atual', String(turn));
  localStorage.setItem('casas_para_andar', '0');
  localStorage.setItem('expedicao_finishers', JSON.stringify(finishers));
  localStorage.setItem('expedicao_skips', JSON.stringify(skips));
  localStorage.setItem('expedicao_wincount', String(winCount));
}

/* ══════════════════════════════════════════════════════
   WIN COUNT
══════════════════════════════════════════════════════ */
function updateWinCountSelect() {
  const sel = document.getElementById('win-count-sel');
  sel.innerHTML = '';
  for (let i = 1; i <= players.length; i++) {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = i === 1 ? '1 jogador' : `${i} jogadores`;
    sel.appendChild(opt);
  }
  sel.value = String(winCount);
}

function setWinCount(v) {
  winCount = parseInt(v) || 1;
  localStorage.setItem('expedicao_wincount', String(winCount));
  renderWinBar();
}

/* ══════════════════════════════════════════════════════
   RENDERIZAÇÃO
══════════════════════════════════════════════════════ */
function renderPawns() {
  document.querySelectorAll('.pawns').forEach(p => (p.innerHTML = ''));
  // Mark finished cells
  Object.values(cellEls).forEach(c => c.classList.remove('finished-cell'));
  players.forEach((pl, i) => {
    const pos  = positions[i] ?? 0;
    const cell = cellEls[pos];
    if (!cell) return;
    if (finishers.includes(i) && pos >= TOTAL - 1) cell.classList.add('finished-cell');
    const pw = document.createElement('div');
    pw.className = 'pawn';
    pw.style.background = pl.cor;
    pw.dataset.pi = i;
    cell.querySelector('.pawns').appendChild(pw);
  });
}

function renderPanel() {
  const pl = players[turn] || players[0];
  document.getElementById('turn-dot').style.background = pl.cor;
  const skipCount = skips[turn] || 0;
  document.getElementById('turn-lbl').textContent = skipCount > 0
    ? `${pl.nome} pula rodada! (${skipCount}x)`
    : `Vez de ${pl.nome}`;

  const list = document.getElementById('pl-list');
  list.innerHTML = '';
  players.forEach((p, i) => {
    const chip = document.createElement('div');
    chip.className = 'pl-chip';
    const finished = finishers.includes(i);
    chip.innerHTML = `<span class="pl-dot" style="background:${p.cor}"></span>${p.nome}: #${(positions[i] ?? 0) + 1}${finished ? ' 🏁' : ''}`;
    list.appendChild(chip);
  });
}

function renderWinBar() {
  document.getElementById('win-count-sel').value = String(winCount);
  const fl = document.getElementById('finishers-list');
  fl.innerHTML = '';
  finishers.forEach(fi => {
    const badge = document.createElement('div');
    badge.className = 'finisher-badge';
    badge.innerHTML = `<span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${players[fi].cor};border:1.5px solid rgba(255,255,255,.5)"></span>${players[fi].nome}`;
    fl.appendChild(badge);
  });
}

/* ══════════════════════════════════════════════════════
   ICON CARD MODAL
══════════════════════════════════════════════════════ */
let iconCardResolve = null;
let pendingIconEffect = null;

function showIconCard(icon) {
  return new Promise(resolve => {
    const cards = ICON_CARDS[icon];
    if (!cards || !cards.length) { resolve(null); return; }

    // Cycle through variants
    if (iconVariantIdx[icon] === undefined) iconVariantIdx[icon] = 0;
    const card = cards[iconVariantIdx[icon] % cards.length];
    iconVariantIdx[icon] = (iconVariantIdx[icon] + 1) % cards.length;

    document.getElementById('ic-emoji').textContent = icon;
    document.getElementById('ic-name').textContent = card.name;
    document.getElementById('ic-info').textContent = card.info;
    document.getElementById('ic-effect').textContent = card.effectText;

    pendingIconEffect = card.effect;
    iconCardResolve = resolve;
    document.getElementById('icon-modal').classList.add('active');
  });
}

function closeIconCard() {
  document.getElementById('icon-modal').classList.remove('active');
  const effect = pendingIconEffect;
  pendingIconEffect = null;
  if (iconCardResolve) {
    iconCardResolve(effect);
    iconCardResolve = null;
  }
}

/* ══════════════════════════════════════════════════════
   MOVIMENTO E VERIFICAÇÃO DE VITÓRIA
══════════════════════════════════════════════════════ */
const delay = ms => new Promise(r => setTimeout(r, ms));

const SPECIAL_ICONS = new Set(Object.keys(ICON_CARDS));

async function movePawn(pi, steps) {
  const from = positions[pi] ?? 0;
  const to   = Math.min(from + steps, TOTAL - 1);
  for (let p = from + 1; p <= to; p++) {
    positions[pi] = p;
    renderPawns();
    const c = cellEls[p];
    if (c) {
      c.classList.add('active');
      c.scrollIntoView({ behavior: 'smooth', block: 'center', inline: 'nearest' });
      setTimeout(() => c.classList.remove('active'), 500);
    }
    await delay(220);
  }
  const finalCell = cellEls[to];
  if (finalCell) {
    const pw = finalCell.querySelector(`.pawn[data-pi="${pi}"]`);
    if (pw) {
      pw.classList.add('moving');
      setTimeout(() => pw.classList.remove('moving'), 750);
    }
  }
  return to;
}

let busy = false;
let iconCardOpen = false;

async function checkMove() {
  if (busy) return;
  busy = true;
  try {
    let steps = parseInt(localStorage.getItem('casas_para_andar') || '0') || 0;
    if (steps > 0) {
      try { turn = parseInt(localStorage.getItem('turno_atual') || '0') || 0; } catch (_) {}
      turn = ((turn % players.length) + players.length) % players.length;

      // Check if player needs to skip
      if ((skips[turn] || 0) > 0) {
        skips[turn]--;
        localStorage.setItem('casas_para_andar', '0');
        turn = (turn + 1) % players.length;
        save();
        renderPanel();
        renderPawns();
        renderWinBar();
        busy = false;
        return;
      }

      // Skip finishers
      if (finishers.includes(turn)) {
        localStorage.setItem('casas_para_andar', '0');
        turn = (turn + 1) % players.length;
        save();
        renderPanel();
        renderPawns();
        renderWinBar();
        busy = false;
        return;
      }

      const landedPos = await movePawn(turn, steps);
      const landedIcon = ICONS[landedPos];

      // Check for special icon BEFORE checking if it's the finish
      if (SPECIAL_ICONS.has(landedIcon) && landedPos < TOTAL - 1) {
        // Show icon card
        const effect = await showIconCard(landedIcon);
        if (effect) {
          if (effect.type === 'move' && effect.value !== 0) {
            const newPos = await movePawn(turn, effect.value);
            positions[turn] = newPos;
            renderPawns();
            await delay(300);
          } else if (effect.type === 'skip') {
            skips[turn] = (skips[turn] || 0) + effect.value;
          }
        }
      }

      const pos = positions[turn];

      // CHEGOU AO FINAL
      if (pos >= TOTAL - 1 && !finishers.includes(turn)) {
        finishers.push(turn);
        renderPanel();
        renderPawns();
        renderWinBar();
        await delay(400);

        if (finishers.length >= winCount) {
          // Fim de jogo!
          const modal = document.getElementById('victory-modal');
          const winnerName = document.getElementById('winner-name');
          const winnerSub  = document.getElementById('winner-sub');
          const podiumList = document.getElementById('podium-list');

          if (finishers.length === 1) {
            winnerName.textContent = players[finishers[0]].nome;
            winnerName.style.color = players[finishers[0]].cor;
            winnerSub.textContent = 'Parabéns por concluir a Expedição Botânica!';
          } else {
            winnerName.textContent = '🏆 CAMPEÕES!';
            winnerName.style.color = '#f5c542';
            winnerSub.textContent = `${finishers.length} exploradores chegaram ao fim!`;
          }

          podiumList.innerHTML = '';
          const medals = ['🥇','🥈','🥉'];
          finishers.forEach((fi, rank) => {
            const item = document.createElement('div');
            item.className = 'podium-item';
            item.innerHTML = `<span>${medals[rank] || `#${rank+1}`}</span><span class="podium-dot" style="background:${players[fi].cor}"></span><span>${players[fi].nome}</span>`;
            podiumList.appendChild(item);
          });

          modal.classList.add('active');
          save();
          busy = false;
          return;
        }
      }

      turn = (turn + 1) % players.length;
      // Skip finishers on next turn selection
      let attempts = 0;
      while (finishers.includes(turn) && attempts < players.length) {
        turn = (turn + 1) % players.length;
        attempts++;
      }
      save();
      renderPanel();
      renderPawns();
      renderWinBar();
    }
  } catch (e) { console.warn(e); }
  busy = false;
}

function voltarAoInicio() {
  localStorage.removeItem('posicoes_jogadores');
  localStorage.removeItem('turno_atual');
  localStorage.removeItem('casas_para_andar');
  localStorage.removeItem('expedicao_finishers');
  localStorage.removeItem('expedicao_skips');
  window.location.href = 'index.html';
}

/* ══════════════════════════════════════════════════════
   DEBUG HELPERS
══════════════════════════════════════════════════════ */
function dbgMove() {
  const steps = parseInt(document.getElementById('dbg-steps').value) || 3;
  localStorage.setItem('casas_para_andar', String(steps));
  checkMove();
}

function dbgReset() {
  const n = parseInt(document.getElementById('dbg-nplayers').value) || 2;
  players = Array.from({ length: n }, (_, i) => ({ nome: P_NAMES[i], cor: P_COLORS[i] }));
  positions = Array(n).fill(0);
  skips = Array(n).fill(0);
  finishers = [];
  turn = 0;
  localStorage.setItem('expedicao_jogadores', JSON.stringify(players));
  localStorage.removeItem('expedicao_finishers');
  localStorage.removeItem('expedicao_skips');
  // Reset perguntas usadas
  localStorage.removeItem('expedicao_perguntas_usadas');
  updateWinCountSelect();
  save();
  renderPawns();
  renderPanel();
  renderWinBar();
}

function irCartas() { window.location.href = 'cartas.html'; }

/* ══════════════════════════════════════════════════════
   LISTENERS DE SISTEMA
══════════════════════════════════════════════════════ */
window.addEventListener('storage', e => {
  const keys = ['casas_para_andar','posicoes_jogadores','turno_atual','expedicao_jogadores'];
  if (keys.includes(e.key)) {
    load();
    renderPanel();
    renderPawns();
    renderWinBar();
    if (e.key === 'casas_para_andar') checkMove();
  }
});

let _lastSteps = 0;
setInterval(() => {
  try {
    const v = parseInt(localStorage.getItem('casas_para_andar') || '0') || 0;
    if (v > 0 && v !== _lastSteps) { _lastSteps = v; checkMove(); }
    else if (v === 0) _lastSteps = 0;
  } catch (_) {}
}, 400);

let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    buildBoard();
    renderPawns();
  }, 200);
});

document.addEventListener('DOMContentLoaded', () => {
  load();
  buildBoard();
  renderPawns();
  renderPanel();
  renderWinBar();
  checkMove();
});
</script>
