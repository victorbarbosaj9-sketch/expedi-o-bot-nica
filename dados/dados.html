<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sorteio de Dados</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background-color: #1a1a1a;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: #333;
    }
    #painel-dados {
      background-color: #2b2b2b;
      border: 4px solid #558b2f;
      border-radius: 15px;
      padding: 30px;
      text-align: center;
      width: 300px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.8);
    }
    .dados-wrapper {
      display: flex;
      justify-content: center;
      gap: 25px;
      margin-bottom: 25px;
    }
    .dado {
      width: 70px;
      height: 70px;
      background-color: #fff;
      border-radius: 12px;
      box-shadow: inset 0 -5px 0 rgba(0,0,0,0.2), 0 5px 8px rgba(0,0,0,0.5);
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      padding: 10px;
    }
    .dot {
      width: 14px;
      height: 14px;
      background-color: #222;
      border-radius: 50%;
      justify-self: center;
      align-self: center;
      box-shadow: inset 0 2px 0 rgba(255,255,255,0.3);
    }
    #btn-sortear {
      background-color: #7ed957;
      color: #1e4d0d;
      font-size: 18px;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      padding: 12px 25px;
      cursor: pointer;
      box-shadow: 0 5px 0 #558b2f;
      transition: all 0.1s;
      width: 100%;
      text-transform: uppercase;
    }
    #btn-sortear:active { transform: translateY(5px); box-shadow: 0 0 0 #558b2f; }
    #btn-sortear:disabled { background-color: #555; color: #888; box-shadow: 0 5px 0 #333; cursor: not-allowed; }
    #resultado-texto {
      color: #f1f8e9;
      margin-top: 20px;
      font-weight: bold;
      font-size: 22px;
      min-height: 26px;
    }
    .rolando { animation: tremer 0.3s infinite; }
    @keyframes tremer {
      0% { transform: rotate(0deg) translateY(0); }
      25% { transform: rotate(-20deg) translateY(-8px); }
      50% { transform: rotate(0deg) translateY(0); }
      75% { transform: rotate(20deg) translateY(-8px); }
      100% { transform: rotate(0deg) translateY(0); }
    }
  </style>
</head>
<body>

  <div id="painel-dados">
    <div class="dados-wrapper">
      <div id="dado1" class="dado"></div>
      <div id="dado2" class="dado"></div>
    </div>
    <button id="btn-sortear" onclick="rolarDados()">🎲 Sortear</button>
    <p id="resultado-texto">Pronto para jogar!</p>
  </div>

  <script>
    const facesDado = {
      1: '<div class="dot" style="grid-area: 2/2"></div>',
      2: '<div class="dot" style="grid-area: 1/3"></div><div class="dot" style="grid-area: 3/1"></div>',
      3: '<div class="dot" style="grid-area: 1/3"></div><div class="dot" style="grid-area: 2/2"></div><div class="dot" style="grid-area: 3/1"></div>',
      4: '<div class="dot" style="grid-area: 1/1"></div><div class="dot" style="grid-area: 1/3"></div><div class="dot" style="grid-area: 3/1"></div><div class="dot" style="grid-area: 3/3"></div>',
      5: '<div class="dot" style="grid-area: 1/1"></div><div class="dot" style="grid-area: 1/3"></div><div class="dot" style="grid-area: 2/2"></div><div class="dot" style="grid-area: 3/1"></div><div class="dot" style="grid-area: 3/3"></div>',
      6: '<div class="dot" style="grid-area: 1/1"></div><div class="dot" style="grid-area: 1/3"></div><div class="dot" style="grid-area: 2/1"></div><div class="dot" style="grid-area: 2/3"></div><div class="dot" style="grid-area: 3/1"></div><div class="dot" style="grid-area: 3/3"></div>'
    };

    function rolarDados() {
      const dado1 = document.getElementById('dado1');
      const dado2 = document.getElementById('dado2');
      const texto = document.getElementById('resultado-texto');
      const btn = document.getElementById('btn-sortear');

      btn.disabled = true;
      texto.innerText = "Rolando...";

      dado1.classList.add('rolando');
      dado2.classList.add('rolando');
      dado1.innerHTML = '';
      dado2.innerHTML = '';

      setTimeout(() => {
        dado1.classList.remove('rolando');
        dado2.classList.remove('rolando');

        const valor1 = Math.floor(Math.random() * 6) + 1;
        const valor2 = Math.floor(Math.random() * 6) + 1;
        const soma = valor1 + valor2;

        dado1.innerHTML = facesDado[valor1];
        dado2.innerHTML = facesDado[valor2];

        texto.innerText = `Você tirou ${soma}!`;
        
        // Altera o botão para voltar ao mapa aplicando os passos
        btn.innerText = "🏃‍♂️ Avançar no Mapa";
        btn.style.backgroundColor = "#ffb300";
        btn.style.boxShadow = "0 5px 0 #ff8f00";
        btn.style.color = "#424242";
        btn.disabled = false;
        
        btn.onclick = () => {
          localStorage.setItem('casas_para_andar', soma);
          window.location.href = "../../mapa/mapa.html";
        };

      }, 1000); 
    }

    window.onload = () => {
      document.getElementById('dado1').innerHTML = facesDado[6];
      document.getElementById('dado2').innerHTML = facesDado[6];
    };
  </script>
</body>
</html>
