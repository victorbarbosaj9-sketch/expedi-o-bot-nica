<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expedição Botânica - Menu Inicial</title>
  <style>
    /* =========================================
       RESET E FUNDO
    ========================================= */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #2b2b2b;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: #333;
      position: relative;
    }

    /* =========================================
       BOTÃO "SOBRE" (Canto Superior Direito)
    ========================================= */
    #btn-sobre {
      position: absolute;
      top: 20px;
      right: 20px;
      background-color: #f1f8e9;
      color: #33691e;
      border: 3px solid #558b2f;
      border-radius: 50%;
      width: 45px;
      height: 45px;
      font-size: 20px;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 6px rgba(0,0,0,0.4);
      transition: transform 0.2s;
    }

    #btn-sobre:hover { transform: scale(1.1); }

    /* =========================================
       MENU PRINCIPAL
    ========================================= */
    #menu-container {
      background-color: transparent;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 400px;
      padding: 20px;
    }

    .header-board {
      background-color: #f1f8e9;
      border: 4px solid #558b2f;
      border-radius: 12px;
      padding: 20px 30px;
      margin-bottom: 40px;
      text-align: center;
      box-shadow: inset 0 0 0 4px #c5e1a5, 0 8px 15px rgba(0,0,0,0.6);
      width: 100%;
    }

    .header-board h1 {
      font-size: 26px;
      color: #33691e;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    /* =========================================
       SELEÇÃO DE JOGADORES
    ========================================= */
    .selecao-container {
      background-color: #333;
      border: 2px solid #555;
      border-radius: 12px;
      padding: 20px;
      width: 100%;
      text-align: center;
      margin-bottom: 30px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.5);
    }

    .selecao-container h3 {
      color: #f1f8e9;
      font-size: 16px;
      margin-bottom: 15px;
      font-weight: 500;
    }

    .botoes-jogadores {
      display: flex;
      justify-content: space-between;
      gap: 10px;
    }

    .btn-jogador {
      flex: 1;
      background-color: #2b2b2b;
      color: #fff;
      border: 2px solid #555;
      border-radius: 8px;
      padding: 15px 0;
      font-size: 20px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s;
    }

    /* Estilo de quando o botão está selecionado */
    .btn-jogador.selecionado {
      background-color: #7ed957;
      color: #1e4d0d;
      border-color: #558b2f;
      box-shadow: 0 4px 0 #558b2f;
      transform: translateY(-4px);
    }

    /* =========================================
       BOTÃO JOGAR
    ========================================= */
    #btn-jogar {
      background-color: #ffb300;
      color: #424242;
      font-size: 22px;
      font-weight: bold;
      border: none;
      border-radius: 10px;
      padding: 15px 40px;
      cursor: pointer;
      box-shadow: 0 6px 0 #ff8f00, 0 10px 15px rgba(0,0,0,0.5);
      transition: all 0.1s;
      width: 100%;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    #btn-jogar:active {
      transform: translateY(6px);
      box-shadow: 0 0 0 #ff8f00;
    }

    /* =========================================
       MODAL (POP-UP "SOBRE")
    ========================================= */
    #modal-sobre {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
      z-index: 100;
      padding: 20px;
    }

    /* Classe que faz o modal aparecer */
    #modal-sobre.ativo {
      opacity: 1;
      pointer-events: auto;
    }

    .modal-content {
      background-color: #f1f8e9;
      border: 6px solid #558b2f;
      border-radius: 15px;
      width: 100%;
      max-width: 350px;
      padding: 30px 20px;
      text-align: center;
      position: relative;
      transform: translateY(-20px);
      transition: transform 0.3s ease;
      box-shadow: inset 0 0 0 4px #c5e1a5;
    }

    #modal-sobre.ativo .modal-content { transform: translateY(0); }

    .btn-fechar {
      position: absolute;
      top: 10px;
      right: 15px;
      background: none;
      border: none;
      font-size: 24px;
      font-weight: bold;
      color: #1e4d0d;
      cursor: pointer;
    }

    .modal-content h2 { color: #33691e; font-size: 22px; margin-bottom: 5px; }
    .modal-content h3 { color: #558b2f; font-size: 16px; margin-bottom: 20px; font-weight: 500; }
    .modal-content p { color: #333; font-weight: bold; margin-bottom: 15px; font-size: 18px; }
    
    .lista-nomes {
      list-style: none;
      text-align: left;
      background-color: #e8f5e9;
      border: 2px solid #aed581;
      border-radius: 8px;
      padding: 15px;
      margin-top: 10px;
    }

    .lista-nomes li {
      font-size: 15px;
      font-weight: 600;
      color: #2b2b2b;
      margin-bottom: 8px;
      padding-bottom: 8px;
      border-bottom: 1px solid #c5e1a5;
    }

    .lista-nomes li:last-child { margin-bottom: 0; padding-bottom: 0; border-bottom: none; }

  </style>
</head>
<body>

  <button id="btn-sobre" onclick="abrirModal()">?</button>

  <div id="menu-container">
    
    <div class="header-board">
      <h1>Expedição Botânica</h1>
    </div>

    <div class="selecao-container">
      <h3>Selecione a quantidade de jogadores:</h3>
      <div class="botoes-jogadores">
        <button class="btn-jogador selecionado" onclick="selecionarJogadores(2, this)">2</button>
        <button class="btn-jogador" onclick="selecionarJogadores(3, this)">3</button>
        <button class="btn-jogador" onclick="selecionarJogadores(4, this)">4</button>
        <button class="btn-jogador" onclick="selecionarJogadores(5, this)">5</button>
      </div>
    </div>

    <button id="btn-jogar" onclick="iniciarJogo()">Jogar</button>

  </div>

  <div id="modal-sobre">
    <div class="modal-content">
      <button class="btn-fechar" onclick="fecharModal()">X</button>
      <h2>Atividade de Sistemática</h2>
      <h3>Jogo Didático - Ensino de Botânica</h3>
      <p>Desenvolvido por:</p>
      
      <ul class="lista-nomes">
        <li>JOÃO VICTOR BARBOSA DE OLIVEIRA </li>
        <li>LUANNA PEREIRA DOS SANTOS</li>
        <li>MARIA FERNANDA VIANA LIMA LOPES </li>
      </ul>
    </div>
  </div>

  <script>
    let quantidadeJogadores = 2; // Padrão é 2 jogadores

    // Lógica para selecionar os botões
    function selecionarJogadores(qtd, botaoClicado) {
      quantidadeJogadores = qtd;

      // Remove a classe "selecionado" de todos os botões
      const todosBotoes = document.querySelectorAll('.btn-jogador');
      todosBotoes.forEach(btn => btn.classList.remove('selecionado'));

      // Adiciona a classe apenas no botão que foi clicado
      botaoClicado.classList.add('selecionado');
    }

    // Lógica para o botão "Jogar"
    function iniciarJogo() {
      // Salva a quantidade escolhida no navegador para a próxima tela conseguir ler
      localStorage.setItem('expedicao_jogadores', quantidadeJogadores);
      

      window.location.href = "./mapa.html"; 
    }

    // Lógica para Abrir e Fechar o Modal
    function abrirModal() {
      document.getElementById('modal-sobre').classList.add('ativo');
    }

    function fecharModal() {
      document.getElementById('modal-sobre').classList.remove('ativo');
    }
  </script>

</body>
</html>
